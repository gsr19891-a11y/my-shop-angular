<section class="login-section">
  <section class="login-info">

    <div class="logo-container">
      <div class="img-div" routerLink="/"><img src="assets/IconIMG.png" alt="Icon Image"/></div>
      <h1 class="brand-name" routerLink="">STEP TECH</h1>
    </div>

    <p class="description">Access exclusive deals and manage your orders with your account.</p>

    <div class="stats">
      <div class="stat">
        <span>50K+</span>
        <p>PRODUCTS</p>
      </div>

      <div class="stat">
        <span>200+</span>
        <p>BRANDS</p>
      </div>

      <div class="stat">
        <span>24/7</span>
        <p>SUPPORT</p>
      </div>
    </div>
  </section>

  <section class="login-block">
    <div>
      <div class="login-icon" routerLink="/">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to continue shopping <i class="fa-solid fa-cart-shopping"></i></p>
    </div>
  <form [formGroup]="signInForm" (ngSubmit)="onSignIn()">
  <div class="input-group">
    <i class="fa-solid fa-envelope"></i>
    <input type="email" placeholder="Email address" formControlName="email" />
  </div>

  <div class="input-group">
    <i class="fa-solid fa-lock"></i>
    <input type="password" placeholder="Password" formControlName="password" />
  </div>

  <div class="form-options">
    <div class="remember-me">
      <input type="checkbox" formControlName="remember" id="remember" />
      <label for="remember">Remember me</label>
    </div>
    <span routerLink="/auth/forgot-password" class="forgot-pass">Forgot password?</span>
  </div>

  <button type="submit" class="submit-btn">Sign In</button>
</form>

  <div class="or-divider">
  <span class="line"></span>
  <p class="or-text">or</p>
  <span class="line"></span>
</div>

    <div class="register-div">
      <p>Don't have an account? <span routerLink="/auth/register">Create one now</span></p>
    </div>
  </section>
</section>
