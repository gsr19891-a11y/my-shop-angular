<footer>
  <p>
    Leave a comment about this site:<i (click)="toggleComment()" class="fa-solid fa-comments"></i>
  </p>
  <span>Created By Lasha-Giorgi Bajadze</span>
  @if (toggle) {
<form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="comment-section" cdkDrag>
  <h2>User Review Form</h2>
  <p class="subtitle">Please leave your review</p>

  <div class="name-div">
    <label for="firstname">Name <span class="required">*</span></label>
    <input id="firstname" formControlName="firstName" type="text" placeholder="Add your name" />
  </div>

  <div class="name-div">
    <label for="lastname">lastname <span class="required">*</span></label>
    <input id="lastname" formControlName="lastName" type="text" placeholder="last name" />
  </div>

  <div class="name-div">
    <label for="email">email <span class="required">*</span></label>
    <input type="email" id="email" formControlName="email" placeholder="email" />
  </div>

  <div class="name-div">
    <label for="age">Age <span class="required">*</span></label>
    <input type="number" id="age" formControlName="age" placeholder="Example: 18" />
  </div>

  <div class="name-div">
    <label for="rating">Rating <span class="required">*</span></label>
    <select formControlName="rating" id="rating">
      <option value="" disabled selected>Select an option ...</option>
      <option value="1">⭐</option>
      <option value="2">⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="5">⭐⭐⭐⭐⭐</option>
    </select>
  </div>

  <div class="name-div">
    <label for="coment">Message</label>
    <textarea id="coment" formControlName="comment" rows="4"></textarea>
  </div>

  <button type="submit" class="submit-btn">Submit</button>
  <button type="button" class="close-btn" (click)="toggleComment()">Close</button>
</form>
  }
</footer>
